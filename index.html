<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Default SEO tags — these are the fallback shown to crawlers/social media
         that don't run JavaScript. The actual restaurant pages override these
         dynamically once React loads. -->
    <title>Restaurant Website</title>
    <meta name="description" content="A beautifully crafted restaurant website by EC Web Co." />

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Restaurant Website" />
    <meta property="og:description" content="A beautifully crafted restaurant website by EC Web Co." />
    <meta property="og:image" content="https://ecwebco.com/og-default.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
